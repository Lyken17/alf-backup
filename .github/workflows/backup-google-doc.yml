name: Backup Google Doc

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Google Doc as Markdown
        env:
          DOC_ID: 1-AtKUh-xE1CPRRDVlfPx1d42Trhr7F8qQIw69hP85Ds
          OUTPUT_FILE: backups/google-doc.md
          MAIN_TAB_ID: t.0
          RED_FLAGS_TAB_ID: t.nx4zmkxu7v5s
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$OUTPUT_FILE")"
          BASE_URL="https://docs.google.com/document/d/${DOC_ID}/export?format=md"
          MAIN_TMP="$(mktemp)"
          RED_FLAGS_TMP="$(mktemp)"
          cleanup() {
            rm -f "$MAIN_TMP" "$RED_FLAGS_TMP"
          }
          trap cleanup EXIT

          download_tab() {
            local tab_id="$1"
            local target_file="$2"
            local curl_exit=0
            local http_status
            http_status="$(curl -sSL -w '%{http_code}' -o "$target_file" "${BASE_URL}&tab=${tab_id}")" || curl_exit=$?
            if [ "$curl_exit" -ne 0 ]; then
              echo "Failed to download Google Doc tab ${tab_id}."
              echo "curl exit code: $curl_exit"
              exit 1
            fi
            if [ "$http_status" != "200" ]; then
              echo "Failed to download Google Doc tab ${tab_id}."
              echo "HTTP status: ${http_status:-unknown}"
              exit 1
            fi
            if [ ! -s "$target_file" ]; then
              echo "Downloaded Google Doc tab ${tab_id} is empty."
              exit 1
            fi
          }

          download_tab "$MAIN_TAB_ID" "$MAIN_TMP"
          download_tab "$RED_FLAGS_TAB_ID" "$RED_FLAGS_TMP"

          {
            printf "## Tab: Main\n\n"
            cat "$MAIN_TMP"
            printf "\n\n## Tab: Red Flags\n\n"
            cat "$RED_FLAGS_TMP"
          } > "$OUTPUT_FILE"

      - name: Commit and push if changed
        env:
          OUTPUT_FILE: backups/google-doc.md
        run: |
          set -euo pipefail
          if git ls-files --error-unmatch "$OUTPUT_FILE" >/dev/null 2>&1; then
            if git diff --quiet -- "$OUTPUT_FILE"; then
              echo "No changes detected."
              exit 0
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE"
          git commit -m "chore: backup Google Doc markdown"
          git push
