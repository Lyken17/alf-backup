name: Backup Google Doc

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Google Doc as Markdown
        env:
          DOC_ID: 1-AtKUh-xE1CPRRDVlfPx1d42Trhr7F8qQIw69hP85Ds
          OUTPUT_FILE: backups/google-doc.md
          MAIN_TAB_ID: t.0
          RED_FLAGS_TAB_ID: t.nx4zmkxu7v5s
          MAIN_TAB_NAME: Main
          RED_FLAGS_TAB_NAME: Red Flags
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$OUTPUT_FILE")"
          BASE_URL="https://docs.google.com/document/d/${DOC_ID}/export?format=md"
          MAIN_TMP="$(mktemp)"
          RED_FLAGS_TMP="$(mktemp)"
          cleanup() {
            rm -f "$MAIN_TMP" "$RED_FLAGS_TMP"
          }
          trap cleanup EXIT

          download_tab() {
            local tab_id="$1"
            local target_file="$2"
            local curl_exit=0
            local http_status
            http_status="$(curl -sSL -w '%{http_code}' -o "$target_file" "${BASE_URL}&tab=${tab_id}")" || curl_exit=$?
            if [ "$curl_exit" -ne 0 ]; then
              echo "Failed to download Google Doc tab ${tab_id}."
              echo "curl exit code: $curl_exit"
              exit 1
            fi
            if [ "$http_status" != "200" ]; then
              echo "Failed to download Google Doc tab ${tab_id}."
              echo "HTTP status: ${http_status:-unknown}"
              exit 1
            fi
            if [ ! -s "$target_file" ]; then
              echo "Downloaded Google Doc tab ${tab_id} is empty."
              exit 1
            fi
          }

          download_tab "$MAIN_TAB_ID" "$MAIN_TMP"
          download_tab "$RED_FLAGS_TAB_ID" "$RED_FLAGS_TMP"

          {
            printf "## Tab: %s\n\n" "$MAIN_TAB_NAME"
            cat "$MAIN_TMP"
            printf "\n\n## Tab: %s\n\n" "$RED_FLAGS_TAB_NAME"
            cat "$RED_FLAGS_TMP"
          } > "$OUTPUT_FILE"

      - name: Extract base64 images to files
        env:
          OUTPUT_FILE: backups/google-doc.md
          IMAGES_DIR: backups/images
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import os, re, base64, pathlib

          md_path  = pathlib.Path(os.environ["OUTPUT_FILE"])
          img_dir  = pathlib.Path(os.environ["IMAGES_DIR"])
          img_dir.mkdir(parents=True, exist_ok=True)

          text = md_path.read_text(encoding="utf-8")

          # Match: [imageN]: <data:image/TYPE;base64,DATA>
          # or without angle brackets:  [imageN]: data:image/TYPE;base64,DATA
          pattern = re.compile(
              r'^\[([^\]]+)\]:\s*<?data:image/([a-zA-Z0-9+]+);base64,([A-Za-z0-9+/=\n]+?)>?\s*$',
              re.MULTILINE,
          )

          replacements = {}
          for m in pattern.finditer(text):
              label, img_type, b64_data = m.group(1), m.group(2), m.group(3)
              # Strip any embedded newlines Google Docs may include in the base64 block
              b64_clean = b64_data.replace('\n', '').replace('\r', '')
              ext = img_type.split('+')[0].lower()   # e.g. "png", "jpeg"
              filename = f"{label}.{ext}"
              filepath = img_dir / filename
              filepath.write_bytes(base64.b64decode(b64_clean))
              rel_link = f"{img_dir}/{filename}"
              replacements[m.group(0)] = f"[{label}]: {rel_link}"
              print(f"Saved {filepath} ({filepath.stat().st_size} bytes)")

          for old, new in replacements.items():
              text = text.replace(old, new)

          md_path.write_text(text, encoding="utf-8")
          print(f"Updated {md_path} with {len(replacements)} image reference(s).")
          PYEOF

      - name: Commit and push if changed
        env:
          OUTPUT_FILE: backups/google-doc.md
          IMAGES_DIR: backups/images
        run: |
          set -euo pipefail
          changed=false
          if git ls-files --error-unmatch "$OUTPUT_FILE" >/dev/null 2>&1; then
            if ! git diff --quiet -- "$OUTPUT_FILE"; then
              changed=true
            fi
          else
            changed=true
          fi
          # Also check for new image files
          if [ -d "$IMAGES_DIR" ] && [ -n "$(git status --porcelain "$IMAGES_DIR")" ]; then
            changed=true
          fi

          if [ "$changed" = "false" ]; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE" "$IMAGES_DIR"
          git commit -m "chore: backup Google Doc markdown"
          git push
